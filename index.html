<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">
<title>엘로이 수학</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
<style>
:root{
  --bg:#f3f4f8;--surface:#ffffff;--surface-2:#f8fafc;
  --border:#eaecef;--border-2:#e2e8f0;
  --text:#0f172a;--text-muted:#64748b;--text-subtle:#94a3b8;
  --primary:#6366f1;--primary-bg:#eef2ff;--primary-fg:#4f46e5;
  --accent:#f97316;
  --imyoung:#3b82f6;--imyoung-bg:#dbeafe;--imyoung-soft:#eff6ff;
  --huijung:#ec4899;--huijung-bg:#fce7f3;--huijung-soft:#fdf2f8;
  --hwijae:#10b981;--hwijae-bg:#d1fae5;--hwijae-soft:#ecfdf5;
  --wonjang:#8b5cf6;--wonjang-bg:#ede9fe;--wonjang-soft:#f5f3ff;
  --special:#f59e0b;--special-bg:#fef3c7;--special-soft:#fffbeb;
  --success:#10b981;--success-bg:#d1fae5;
  --danger:#ef4444;--danger-bg:#fee2e2;
  --warning:#f59e0b;--warning-bg:#fef3c7;
  --pastel-peach:#ffe9d9;--pastel-peach-fg:#c2410c;
  --pastel-mint:#d1fae5;--pastel-mint-fg:#047857;
  --pastel-lavender:#e9e5ff;--pastel-lavender-fg:#5b21b6;
  --pastel-yellow:#fef3c7;--pastel-yellow-fg:#b45309;
  --shadow-xs:0 1px 1px rgba(15,23,42,.03);
  --shadow-sm:0 2px 4px rgba(15,23,42,.04),0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 14px rgba(15,23,42,.06),0 2px 4px rgba(15,23,42,.04);
  --shadow-lg:0 14px 40px rgba(15,23,42,.12);
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit}

/* App Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;z-index:50}
.sidebar-logo{display:flex;align-items:center;gap:9px;padding:6px 10px 18px;border-bottom:1px solid var(--border);margin-bottom:10px}
.sidebar-logo .logo-mark{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.sidebar-logo .logo-text{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.sidebar-logo .logo-text span{color:var(--primary)}
.sidebar-section{font-size:10px;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.6px;margin:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;color:var(--text-muted);font-weight:500;font-size:13px;transition:all .12s;background:none;border:none;width:100%;text-align:left;margin-bottom:1px;position:relative}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--primary-bg);color:var(--primary-fg);font-weight:700}
.nav-item.active::before{content:'';position:absolute;left:-14px;top:9px;bottom:9px;width:3px;background:var(--primary);border-radius:0 3px 3px 0}
.nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-badge{margin-left:auto;font-size:10px;background:var(--danger);color:#fff;padding:1px 6px;border-radius:8px;font-weight:700}
.sidebar-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:10px}
.sidebar-profile{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer}
.sidebar-profile:hover{background:var(--surface-2)}
.profile-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f97316);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.profile-name{font-size:12px;font-weight:700;line-height:1.2}
.profile-role{font-size:10px;color:var(--text-muted);margin-top:2px}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:40}
.topbar-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
.topbar-search{flex:1;max-width:480px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:7px 12px;display:flex;align-items:center;gap:8px;transition:all .12s}
.topbar-search:focus-within{background:var(--surface);border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
.topbar-search input{border:none;outline:none;flex:1;background:transparent;font-size:13px}
.topbar-search .icon{color:var(--text-subtle);font-size:13px}
.search-clear{background:none;border:none;color:var(--text-subtle);cursor:pointer;font-size:13px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-pill{font-size:11px;padding:5px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;font-weight:700;color:var(--text-muted)}
.topbar-pill.live{background:#ecfdf5;color:#059669;border-color:#a7f3d0}
.icon-btn{width:34px;height:34px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text-muted);transition:all .12s}
.icon-btn:hover{background:var(--surface);border-color:var(--primary);color:var(--primary)}

/* Mobile menu toggle */
.menu-toggle{display:none;width:34px;height:34px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);align-items:center;justify-content:center;cursor:pointer;font-size:16px}

/* Content */
.content{padding:22px;max-width:1400px;margin:0 auto;width:100%}
.tab{display:none;animation:fadeIn .2s}
.tab.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Section title */
.section-title{font-size:15px;font-weight:700;letter-spacing:-.2px;margin:22px 0 10px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.section-title:first-child{margin-top:0}
.section-title .count-badge{background:var(--primary-bg);color:var(--primary-fg);padding:2px 9px;border-radius:9px;font-size:10px;font-weight:700;border:none}
.section-title .right-meta{font-size:12px;color:var(--text-muted);font-weight:500}

/* Welcome card (홈 상단) */
.welcome{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);color:#fff;border-radius:var(--radius-lg);padding:22px 26px;margin-bottom:18px;display:flex;align-items:center;gap:18px;box-shadow:0 14px 30px rgba(99,102,241,.25);position:relative;overflow:hidden}
.welcome::before{content:'🧮';position:absolute;right:-30px;top:50%;transform:translateY(-50%);font-size:200px;opacity:.08}
.welcome-text{flex:1;position:relative;z-index:1}
.welcome-greeting{font-size:13px;opacity:.9;font-weight:600;margin-bottom:5px}
.welcome-title{font-size:22px;font-weight:800;letter-spacing:-.3px;line-height:1.3}
.welcome-stats{position:relative;z-index:1;display:flex;gap:18px}
.welcome-stat{text-align:center}
.welcome-stat .num{font-size:28px;font-weight:800;line-height:1}
.welcome-stat .lbl{font-size:11px;opacity:.85;margin-top:3px;font-weight:600}

/* Pastel stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:13px;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:all .15s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-icon.peach{background:var(--pastel-peach);color:var(--pastel-peach-fg)}
.stat-icon.mint{background:var(--pastel-mint);color:var(--pastel-mint-fg)}
.stat-icon.lavender{background:var(--pastel-lavender);color:var(--pastel-lavender-fg)}
.stat-icon.yellow{background:var(--pastel-yellow);color:var(--pastel-yellow-fg)}
.stat-card .info .lbl{font-size:11px;color:var(--text-muted);font-weight:600}
.stat-card .info .num{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-top:2px}
.stat-card .info .delta{font-size:10px;color:var(--success);font-weight:700;margin-top:3px}
.stat-card .info .delta.down{color:var(--danger)}

/* Two column layout */
.two-col{display:grid;grid-template-columns:1fr 320px;gap:18px}

/* Card */
.card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.card-title{font-size:15px;font-weight:700;letter-spacing:-.2px}
.card-sub{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:2px}

/* Slot card (홈/수업 시간 슬롯) */
.slot-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-xs);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;transition:all .12s}
.slot-card:hover{box-shadow:var(--shadow-sm)}
.slot-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-left:3px solid var(--primary);background:var(--surface-2)}
.slot-head.t-imyoung{border-left-color:var(--imyoung);background:var(--imyoung-soft)}
.slot-head.t-huijung{border-left-color:var(--huijung);background:var(--huijung-soft)}
.slot-head.t-hwijae{border-left-color:var(--hwijae);background:var(--hwijae-soft)}
.slot-head.t-wonjang{border-left-color:var(--wonjang);background:var(--wonjang-soft)}
.slot-head.t-special{border-left-color:var(--special);background:var(--special-soft)}
.slot-day{font-weight:800;font-size:13px;flex-shrink:0}
.slot-time{font-size:13px;color:var(--text-muted);font-weight:600;flex-shrink:0}
.slot-room-pill{font-size:10px;padding:3px 8px;background:var(--primary-bg);color:var(--primary-fg);border-radius:7px;font-weight:700;flex-shrink:0}
.t-imyoung .slot-room-pill{background:var(--imyoung-bg);color:var(--imyoung)}
.t-huijung .slot-room-pill{background:var(--huijung-bg);color:var(--huijung)}
.t-hwijae .slot-room-pill{background:var(--hwijae-bg);color:var(--hwijae)}
.t-wonjang .slot-room-pill{background:var(--wonjang-bg);color:var(--wonjang)}
.t-special .slot-room-pill{background:var(--special-bg);color:var(--special)}
.slot-teacher-name{font-size:12px;color:var(--text-muted);font-weight:600;margin-left:auto;flex-shrink:0}
.slot-stu-count{font-size:11px;font-weight:700;color:var(--text);background:var(--surface);padding:3px 9px;border-radius:8px;border:1px solid var(--border);flex-shrink:0}
.slot-students{display:flex;flex-wrap:wrap;gap:6px;padding:11px 16px}
.chip{padding:5px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;font-size:12px;color:var(--text);font-weight:600;display:inline-flex;align-items:center;gap:4px}
.chip.has-eng{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#fcd34d}
.chip.has-eng::after{content:'E';font-size:8px;background:var(--special);color:#fff;padding:1px 4px;border-radius:4px;font-weight:700;margin-left:2px}
.chip-grade{font-size:9px;color:var(--text-subtle);font-weight:700}

/* TIME GRID (시간표 탭) */
.tt-grid{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden}
.tt-row{display:grid;grid-template-columns:64px repeat(5,1fr);border-bottom:1px solid var(--border)}
.tt-row:last-child{border-bottom:none}
.tt-row.tt-header{background:var(--surface-2);position:sticky;top:0;z-index:5}
.tt-cell{padding:8px 6px;border-right:1px solid var(--border);min-height:64px;position:relative}
.tt-cell:last-child{border-right:none}
.tt-time-label{font-size:11px;font-weight:700;color:var(--text-muted);background:var(--surface-2);padding:8px 6px;text-align:center;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.tt-day-label{font-size:12px;font-weight:800;letter-spacing:-.2px;text-align:center;padding:11px 6px;color:var(--text)}
.tt-day-label .day-date{font-size:9px;color:var(--text-subtle);font-weight:600;display:block;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.tt-cell-empty{background:repeating-linear-gradient(45deg,transparent 0 6px,rgba(15,23,42,.012) 6px 12px)}
.tt-event{background:#fff;border-radius:7px;padding:5px 7px;margin-bottom:3px;cursor:pointer;border:1px solid var(--border);position:relative;transition:all .12s}
.tt-event:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.tt-event.t-imyoung{border-left:3px solid var(--imyoung);background:var(--imyoung-soft)}
.tt-event.t-huijung{border-left:3px solid var(--huijung);background:var(--huijung-soft)}
.tt-event.t-hwijae{border-left:3px solid var(--hwijae);background:var(--hwijae-soft)}
.tt-event.t-wonjang{border-left:3px solid var(--wonjang);background:var(--wonjang-soft)}
.tt-event.t-special{border-left:3px solid var(--special);background:var(--special-soft)}
.tt-event-head{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;margin-bottom:2px}
.tt-event-room{padding:1px 5px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:.2px}
.tt-event.t-imyoung .tt-event-room{background:var(--imyoung-bg);color:var(--imyoung)}
.tt-event.t-huijung .tt-event-room{background:var(--huijung-bg);color:var(--huijung)}
.tt-event.t-hwijae .tt-event-room{background:var(--hwijae-bg);color:var(--hwijae)}
.tt-event.t-wonjang .tt-event-room{background:var(--wonjang-bg);color:var(--wonjang)}
.tt-event.t-special .tt-event-room{background:var(--special-bg);color:var(--special)}
.tt-event-teacher{font-size:9px;font-weight:800}
.tt-event.t-imyoung .tt-event-teacher{color:var(--imyoung)}
.tt-event.t-huijung .tt-event-teacher{color:var(--huijung)}
.tt-event.t-hwijae .tt-event-teacher{color:var(--hwijae)}
.tt-event.t-wonjang .tt-event-teacher{color:var(--wonjang)}
.tt-event.t-special .tt-event-teacher{color:var(--special)}
.tt-event-count{font-size:9px;font-weight:700;background:rgba(255,255,255,.7);padding:1px 5px;border-radius:4px;margin-left:auto;color:var(--text-muted)}
.tt-event-students{font-size:10px;color:var(--text);line-height:1.3;font-weight:500}

/* Date bar */
.date-bar{display:flex;align-items:center;gap:9px;padding:11px 14px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-xs);border:1px solid var(--border);margin-bottom:14px}
.date-bar input[type=date]{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:9px;font-size:13px;outline:none;font-weight:600}
.date-bar input[type=date]:focus{border-color:var(--primary)}
.date-bar .day-pill{font-size:12px;font-weight:800;color:var(--primary-fg);background:var(--primary-bg);padding:6px 11px;border-radius:9px}
.date-bar .btn{padding:6px 13px;background:var(--surface);border:1px solid var(--border);border-radius:9px;font-size:12px;cursor:pointer;color:var(--text);font-weight:700}
.date-bar .btn:hover{background:var(--surface-2)}

/* Filter bar */
.filter-bar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 13px;background:var(--surface);border:1px solid var(--border);border-radius:14px;font-size:12px;color:var(--text-muted);font-weight:700;cursor:pointer;white-space:nowrap;transition:all .12s}
.filter-chip:hover{border-color:var(--primary);color:var(--primary)}
.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 12px rgba(99,102,241,.25)}

/* Student input card (수업 탭) */
.stu-card{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow-xs);border:1px solid var(--border);overflow:hidden;transition:all .12s}
.stu-card:hover{box-shadow:var(--shadow-sm)}
.stu-card.absent{opacity:.65;border-left:3px solid var(--danger)}
.stu-card.present{border-left:3px solid var(--success)}
.stu-card.late{border-left:3px solid var(--warning)}
.stu-card.makeup{border-left:3px solid var(--primary)}
.stu-card-head{padding:12px 14px;display:flex;align-items:center;cursor:pointer;gap:10px;flex-wrap:wrap}
.stu-card-head:hover{background:var(--surface-2)}
.stu-name-row{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.stu-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#6366f1);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.stu-avatar.has-eng{background:linear-gradient(135deg,#f59e0b,#f97316)}
.stu-name{font-size:14px;font-weight:700}
.stu-meta{font-size:10px;color:var(--text-muted);font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-subtle);flex-shrink:0}
.status-dot.present{background:var(--success);box-shadow:0 0 0 3px var(--success-bg)}
.status-dot.absent{background:var(--danger);box-shadow:0 0 0 3px var(--danger-bg)}
.status-dot.late{background:var(--warning);box-shadow:0 0 0 3px var(--warning-bg)}
.status-dot.makeup{background:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
.expand-arrow{color:var(--text-subtle);font-size:13px;transition:transform .2s}
.stu-card.open .expand-arrow{transform:rotate(180deg)}
.stu-card-body{display:none;padding:0 14px 14px;border-top:1px dashed var(--border);background:linear-gradient(180deg,var(--surface-2) 0%,var(--surface) 100%)}
.stu-card.open .stu-card-body{display:block}

.field{margin-top:11px}
.field:first-child{margin-top:13px}
.field-label{font-size:10px;font-weight:800;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field-input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:9px;font-size:13px;background:var(--surface);outline:none;transition:all .12s}
.field-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
textarea.field-input{resize:vertical;min-height:54px;font-family:inherit}
.toggle-row{display:flex;gap:5px;flex-wrap:wrap}
.toggle-btn{flex:1;min-width:60px;padding:8px 5px;border:1px solid var(--border);background:var(--surface);border-radius:9px;font-size:11px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .12s;text-align:center}
.toggle-btn:hover{border-color:var(--text-muted);background:var(--surface-2)}
.toggle-btn.active{color:#fff;border-color:transparent;box-shadow:var(--shadow-sm)}
.toggle-btn.active.present{background:var(--success)}
.toggle-btn.active.absent{background:var(--danger)}
.toggle-btn.active.late{background:var(--warning)}
.toggle-btn.active.makeup{background:var(--primary)}
.toggle-btn.active.pass{background:var(--success)}
.toggle-btn.active.fail{background:var(--danger)}
.pct-row{display:flex;gap:4px;flex-wrap:wrap}
.pct-btn{flex:1;min-width:50px;padding:8px 4px;border:1px solid var(--border);background:var(--surface);border-radius:8px;font-size:11px;font-weight:700;color:var(--text-muted);cursor:pointer;text-align:center}
.pct-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.stars-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stars-item{display:flex;flex-direction:column;gap:4px}
.stars-label{font-size:10px;color:var(--text-muted);font-weight:700}
.stars-buttons{display:flex;gap:3px}
.star-btn{flex:1;padding:6px 0;border:1px solid var(--border);background:var(--surface);border-radius:6px;font-size:11px;font-weight:700;color:var(--text-muted);cursor:pointer}
.star-btn.active{background:#fbbf24;color:#92400e;border-color:#f59e0b}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:6px}

/* Class time header */
.tab-class-time-header{font-size:13px;font-weight:800;color:var(--text);padding:12px 16px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-xs);margin:18px 0 8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;border-left:4px solid var(--primary)}
.tab-class-time-header.t-imyoung{border-left-color:var(--imyoung)}
.tab-class-time-header.t-huijung{border-left-color:var(--huijung)}
.tab-class-time-header.t-hwijae{border-left-color:var(--hwijae)}
.tab-class-time-header.t-wonjang{border-left-color:var(--wonjang)}
.tab-class-time-header.t-special{border-left-color:var(--special)}
.tab-class-time-header .meta{display:flex;gap:9px;align-items:center;flex-wrap:wrap}

/* Student grid (수업 탭의 수업 보기) */
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px}

/* Progress card */
.progress-row{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:9px;box-shadow:var(--shadow-xs);border:1px solid var(--border)}
.progress-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;gap:10px}
.progress-head .name{font-size:14px;font-weight:700}
.progress-head .grade{font-size:10px;color:var(--text-muted);margin-left:5px;font-weight:600}
.progress-empty{font-size:11px;color:var(--text-subtle);font-style:italic;padding:7px 0}
.progress-empty .add-btn{display:inline-block;padding:5px 11px;background:var(--primary-bg);color:var(--primary-fg);border-radius:8px;font-size:10px;font-weight:700;font-style:normal;margin-left:7px;cursor:pointer;border:none}
.progress-item{margin-top:9px}
.progress-item:first-of-type{margin-top:0}
.progress-item-head{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;gap:10px}
.progress-book{color:var(--text-muted);font-weight:600}
.progress-book b{color:var(--text);margin-right:5px;font-weight:700}
.progress-pct{color:var(--primary);font-weight:800}
.progress-bar{width:100%;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .3s}

/* Empty/Loading */
.empty{text-align:center;color:var(--text-subtle);padding:60px 22px;font-size:13px;background:var(--surface);border-radius:var(--radius);border:1px dashed var(--border)}
.empty .empty-icon{font-size:38px;margin-bottom:10px;opacity:.5}
.empty .empty-title{font-weight:700;color:var(--text-muted);margin-bottom:4px;font-size:14px}
.loading{text-align:center;padding:50px 22px;color:var(--text-muted)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* List card (관리/설정) */
.list-card{background:var(--surface);border-radius:var(--radius);padding:13px 16px;margin-bottom:7px;box-shadow:var(--shadow-xs);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;transition:all .12s}
.list-card:hover{box-shadow:var(--shadow-sm)}
.list-card .info{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
.list-card .title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.list-card .meta{font-size:11px;color:var(--text-muted);margin-top:3px;font-weight:500}
.list-card .badge{font-size:9px;padding:2px 8px;border-radius:8px;font-weight:800;letter-spacing:.2px}
.list-card .badge.unresolved{background:var(--warning-bg);color:var(--warning)}
.list-card .badge.resolved{background:var(--success-bg);color:var(--success)}
.list-card .badge.eng{background:var(--special-bg);color:var(--special)}
.list-card .actions{display:flex;gap:5px}
.list-card .actions button{padding:6px 11px;border:1px solid var(--border);background:var(--surface);border-radius:8px;font-size:11px;cursor:pointer;color:var(--text);font-weight:700;transition:all .12s}
.list-card .actions button:hover{background:var(--surface-2)}
.list-card .actions button.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.list-card .actions button.primary:hover{background:var(--primary-fg)}
.list-card .actions button.danger{background:var(--danger);color:#fff;border-color:var(--danger)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:200;padding:14px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex;animation:fadeIn .15s}
.modal{background:var(--surface);border-radius:var(--radius-lg);max-width:520px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--surface-2)}
.modal-body{padding:18px 20px}
.modal-foot{padding:13px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}
.btn{padding:9px 16px;border:1px solid var(--border);background:var(--surface);border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text);transition:all .12s}
.btn:hover{background:var(--surface-2)}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.primary:hover{background:var(--primary-fg)}
.btn.danger{background:var(--danger);color:#fff;border-color:var(--danger)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;animation:toastIn .2s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.error{background:var(--danger)}
.toast.success{background:var(--success)}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

/* Side panel (오른쪽 사이드 카드) */
.side-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--border);margin-bottom:14px}
.side-card-title{font-size:13px;font-weight:800;letter-spacing:-.2px;margin-bottom:10px}
.attendance-summary{display:flex;flex-direction:column;gap:10px}
.attendance-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.attendance-row .label{display:flex;align-items:center;gap:7px;font-weight:600;color:var(--text-muted)}
.attendance-row .value{font-weight:800;font-size:14px}

/* Mobile */
@media (max-width:1023px){
  .menu-toggle{display:flex}
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .25s;width:260px;z-index:90;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:80}
  .sidebar-overlay.open{display:block;animation:fadeIn .15s}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .topbar{padding:11px 14px}
  .content{padding:14px}
  .welcome{padding:18px;flex-direction:column;align-items:flex-start;gap:14px}
  .welcome-stats{width:100%;justify-content:space-around}
  .tt-row{grid-template-columns:46px repeat(5,1fr)}
  .tt-time-label{font-size:10px;padding:5px 3px}
  .tt-cell{padding:5px 3px;min-height:54px}
  .tt-event{padding:4px 5px}
  .tt-event-head{font-size:9px}
  .tt-event-students{font-size:9px}
  .tt-day-label{padding:8px 4px;font-size:11px}
  .student-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
@media (max-width:540px){
  .stat-grid{gap:8px}
  .stat-card{padding:13px 14px}
  .stat-icon{width:42px;height:42px;font-size:18px}
  .stat-card .info .num{font-size:20px}
}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">🧮</div>
      <div class="logo-text">엘로이 <span>수학</span></div>
    </div>
    <div class="sidebar-section">메뉴</div>
    <button class="nav-item active" data-tab="home"><span class="nav-icon">🏠</span><span>홈</span></button>
    <button class="nav-item" data-tab="class"><span class="nav-icon">👥</span><span>오늘 수업</span></button>
    <button class="nav-item" data-tab="timetable"><span class="nav-icon">🗓</span><span>시간표</span></button>
    <button class="nav-item" data-tab="progress"><span class="nav-icon">📊</span><span>학생 진도</span></button>
    <div class="sidebar-section">관리</div>
    <button class="nav-item" data-tab="manage"><span class="nav-icon">⚠️</span><span>학생 관리</span><span class="nav-badge" id="manageBadge" style="display:none">0</span></button>

    <button class="nav-item" data-tab="settings"><span class="nav-icon">⚙️</span><span>설정</span></button>
    <div class="sidebar-bottom">
      <div class="sidebar-profile">
        <div class="profile-avatar" id="profileAvatar">엘</div>

          <div class="profile-name" id="profileName">원장님</div>
          <div class="profile-role" id="profileRole">전체 보기</div>
        </div>
      </div>

  <main class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <h1 class="topbar-title" id="topbarTitle">대시보드</h1>
      <div class="topbar-search">
        <span class="icon">🔍</span>
        <input id="searchInput" placeholder="학생 이름 검색..." autocomplete="off">
        <button class="search-clear" id="searchClear" style="display:none">✕</button>
      </div>
      <div class="topbar-right">
        <span class="topbar-pill" id="dateDisplay">-</span>
        <span class="topbar-pill live">●  Live</span>
      </div>

    <div class="content">
      <!-- HOME -->
      <div id="home" class="tab active">
        <div class="welcome">
          <div class="welcome-text">
            <div class="welcome-greeting">안녕하세요 👋</div>
            <div class="welcome-title" id="welcomeTitle">오늘 수업은 -개</div>
          </div>
          <div class="welcome-stats">
            <div class="welcome-stat"><div class="num" id="welcomePresent">-</div><div class="lbl">출석</div></div>
            <div class="welcome-stat"><div class="num" id="welcomeAbsent">-</div><div class="lbl">결석</div></div>
            <div class="welcome-stat"><div class="num" id="welcomeUnrec">-</div><div class="lbl">미기록</div></div>
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-icon peach">👥</div>
            <div class="info"><div class="lbl">전체 수강생</div><div class="num" id="totalCount">-</div></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon mint">🎒</div>
            <div class="info"><div class="lbl">초등</div><div class="num" id="elemCount">-</div></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon lavender">📚</div>
            <div class="info"><div class="lbl">중등</div><div class="num" id="middleCount">-</div></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon yellow">🌐</div>
            <div class="info"><div class="lbl">영어 병행</div><div class="num" id="engCount">-</div></div>
          </div>
        </div>

        <div class="two-col">
          <div>
            <div class="section-title">수업 시간표 <span class="count-badge" id="slotCount">0개</span></div>
            <div id="homeList" class="loading"><div class="spinner"></div><div>불러오는 중…</div></div>
          </div>
          <div>
            <div class="side-card">
              <div class="side-card-title">📌 오늘 ({{}}<span id="todayDayLabel">-</span>요일)</div>
              <div class="attendance-summary">
                <div class="attendance-row"><span class="label"><span class="status-dot present"></span>출석</span><span class="value" id="sidePresent">-</span></div>
                <div class="attendance-row"><span class="label"><span class="status-dot absent"></span>결석</span><span class="value" id="sideAbsent">-</span></div>
                <div class="attendance-row"><span class="label"><span class="status-dot"></span>미기록</span><span class="value" id="sideUnrec">-</span></div>
                <div class="attendance-row"><span class="label">📚 오늘 수업</span><span class="value" id="sideTodayClassCount">-</span></div>

      </div>

      <!-- MANAGE -->
      <div id="manage" class="tab">
        <div class="section-title">학생 관리 <span class="count-badge" id="manageCount">0건</span></div>
        <div class="filter-bar" id="manageFilters"></div>
        <div id="manageList" class="loading"><div class="spinner"></div><div>불러오는 중…</div></div>

      <!-- HISTORY -->
      <div id="history" class="tab">

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyD6NViX8FsD1k02e_emkLsanfbM6yTIXpw",authDomain:"elroy-class-guide.firebaseapp.com",databaseURL:"https://elroy-class-guide-default-rtdb.firebaseio.com",projectId:"elroy-class-guide",storageBucket:"elroy-class-guide.firebasestorage.app",messagingSenderId:"817466043400",appId:"1:817466043400:web:50ceea5093e70108dc75bd"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const urlParams=new URLSearchParams(location.search);
const currentTeacher=urlParams.get('teacher')||'admin';
const TEACHER_NAMES={admin:'전체 보기',imyoung:'임영쌤',huijung:'희정쌤',hwijae:'휘재쌤',wonjang:'원장쌤'};
const TEACHER_SHORT={admin:'전체',imyoung:'임영',huijung:'희정',hwijae:'휘재',wonjang:'원장'};
const TEACHER_CLASS=(t)=>!t?'t-special':'t-'+t;
const DAY_NAMES=['일','월','화','수','목','금','토'];
const TAB_TITLES={home:'대시보드',class:'오늘 수업 입력',timetable:'주간 시간표',progress:'학생 진도',manage:'학생 관리',history:'수업 기록',settings:'설정'};

document.getElementById('profileName').textContent=currentTeacher==='admin'?'원장님':TEACHER_NAMES[currentTeacher]||currentTeacher;
document.getElementById('profileRole').textContent=TEACHER_NAMES[currentTeacher]||currentTeacher;
document.getElementById('profileAvatar').textContent=(TEACHER_NAMES[currentTeacher]||'엘').charAt(0);
document.querySelector('.sidebar-logo .logo-text span').textContent='수학';

let allStudents=[];
let progressData={};
let classGuideData={};
let stuMgmtData={};
let booksData={};
let searchTerm='';
let activeManageFilter='unresolved';
let activeProgressFilter='all';
let activeSettingsFilter='all';
let currentClassDate=todayStr();
let currentHistoryDate=todayStr();

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayOfDate(s){const d=new Date(s+'T00:00:00');return DAY_NAMES[d.getDay()];}
function setDateDisplay(){const t=todayStr();document.getElementById('dateDisplay').textContent=t.slice(5)+' '+dayOfDate(t);document.getElementById('todayDayLabel').textContent=dayOfDate(t);}

// Sidebar nav
document.querySelectorAll('.nav-item').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const tab=b.dataset.tab;
    document.getElementById(tab).classList.add('active');
    document.getElementById('topbarTitle').textContent=TAB_TITLES[tab]||'대시보드';
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

// Mobile menu
document.getElementById('menuToggle').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
});

// Search
const searchInput=document.getElementById('searchInput');
const searchClear=document.getElementById('searchClear');
searchInput.addEventListener('input',e=>{searchTerm=e.target.value.trim();searchClear.style.display=searchTerm?'block':'none';renderAll();});
searchClear.addEventListener('click',()=>{searchInput.value='';searchTerm='';searchClear.style.display='none';renderAll();});

function setupDateBar(inputId,labelId,todayBtnId,onChange){
  const inp=document.getElementById(inputId);const lbl=document.getElementById(labelId);const btn=document.getElementById(todayBtnId);
  inp.value=todayStr();lbl.textContent=dayOfDate(inp.value);
  inp.addEventListener('change',()=>{lbl.textContent=dayOfDate(inp.value);onChange(inp.value);});
  btn.addEventListener('click',()=>{inp.value=todayStr();lbl.textContent=dayOfDate(inp.value);onChange(inp.value);});
}
setupDateBar('classDate','classDateDayLabel','classDateToday',(d)=>{currentClassDate=d;loadClassGuide(d);renderClass()});
setupDateBar('historyDate','historyDayLabel','historyDateToday',(d)=>{currentHistoryDate=d;loadHistoryGuide(d);renderHistory()});

function filterByTeacher(students){if(currentTeacher==='admin')return students;return students.filter(s=>(s.classes||[]).some(c=>c.teacher===currentTeacher));}
function filterBySearch(students){if(!searchTerm)return students;return students.filter(s=>s.name&&s.name.includes(searchTerm));}
function teacherFilteredClasses(s){return (s.classes||[]).filter(c=>currentTeacher==='admin'||c.teacher===currentTeacher);}

db.ref('math_students').on('value',snap=>{
  const data=snap.val()||{};
  allStudents=Object.entries(data).map(([id,s])=>({id,...s}));
  renderAll();
});
db.ref('math_progress').on('value',snap=>{progressData=snap.val()||{};renderProgress();});
db.ref('math_stuMgmt').on('value',snap=>{stuMgmtData=snap.val()||{};renderManage();updateBadges();});
db.ref('math_books').on('value',snap=>{booksData=snap.val()||{};});

function loadClassGuide(date){db.ref('math_classGuide/'+date).on('value',snap=>{classGuideData[date]=snap.val()||{};renderClass();renderHome();});}
function loadHistoryGuide(date){db.ref('math_classGuide/'+date).once('value').then(snap=>{classGuideData[date]=snap.val()||{};renderHistory();});}
loadClassGuide(currentClassDate);

function renderAll(){renderHome();renderClass();renderManage();renderHistory();renderProgress();renderTimetable();renderSettings();}
function updateBadges(){
  const unresolved=Object.values(stuMgmtData||{}).filter(i=>!i.resolved).length;
  const badge=document.getElementById('manageBadge');
  if(unresolved>0){badge.textContent=unresolved;badge.style.display='inline-block';}else{badge.style.display='none';}
}

const DAY_ORDER='월화수목금';
const TIME_TO_NUM=(t)=>{const m=String(t||'').match(/(\d+):(\d+)/);return m?parseInt(m[1])*60+parseInt(m[2]):9999;};
function gradeShort(g){if(!g||g==='?')return'?';if(g.startsWith('초')||g.startsWith('중')||g.startsWith('고'))return g;if(/^\d+$/.test(g))return'초'+g;return g;}
function normGrade(s){const g=s.grade||'?';if(g==='?')return'?';if(g.startsWith('중')||g.startsWith('고'))return g;if(/^\d+$/.test(g))return'초'+g;return g;}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function renderHome(){
  const filtered=filterByTeacher(allStudents);
  const searched=filterBySearch(filtered);
  document.getElementById('totalCount').textContent=filtered.length;
  document.getElementById('elemCount').textContent=filtered.filter(s=>s.kind==='초등').length;
  document.getElementById('middleCount').textContent=filtered.filter(s=>s.kind==='중등').length;
  document.getElementById('engCount').textContent=filtered.filter(s=>s.hasEnglish).length;

  const today=todayStr();
  const todayDay=dayOfDate(today);
  const todayClasses=[];
  const todayStudents=new Set();
  searched.forEach(s=>{teacherFilteredClasses(s).forEach(c=>{if(c.day===todayDay){todayClasses.push({...c,sid:s.id,name:s.name});todayStudents.add(s.id);}});});
  document.getElementById('welcomeTitle').textContent='오늘 수업은 '+todayClasses.length+'개';
  const cg=classGuideData[today]||{};
  let pres=0,abs=0,unrec=0;
  todayStudents.forEach(sid=>{const r=cg[sid];if(!r||!r.attendance)unrec++;else if(['present','late','makeup'].includes(r.attendance))pres++;else if(r.attendance==='absent')abs++;});
  document.getElementById('welcomePresent').textContent=pres;
  document.getElementById('welcomeAbsent').textContent=abs;
  document.getElementById('welcomeUnrec').textContent=unrec;
  document.getElementById('sidePresent').textContent=pres;
  document.getElementById('sideAbsent').textContent=abs;
  document.getElementById('sideUnrec').textContent=unrec;
  document.getElementById('sideTodayClassCount').textContent=todayClasses.length;

  // Teacher stats sidebar
  const teacherCounts={};
  searched.forEach(s=>{const set=new Set();(s.classes||[]).forEach(c=>{if(c.teacher)set.add(c.teacher);});set.forEach(t=>{teacherCounts[t]=(teacherCounts[t]||0)+1;});});
  const teacherStats=document.getElementById('teacherStats');
  let tsHtml='';
  ['imyoung','huijung','hwijae','wonjang'].forEach(t=>{
    const cnt=teacherCounts[t]||0;
    if(cnt===0&&currentTeacher!=='admin'&&t!==currentTeacher)return;
    tsHtml+='<div class="attendance-row"><span class="label"><span class="status-dot" style="background:var(--'+t+')"></span>'+TEACHER_NAMES[t]+'</span><span class="value">'+cnt+'명</span></div>';
  });
  teacherStats.innerHTML=tsHtml;

  if(searched.length===0){document.getElementById('homeList').innerHTML=emptyState('학생 없음',searchTerm?'"'+searchTerm+'" 검색 결과가 없어요':'학생 데이터를 불러오는 중...');document.getElementById('slotCount').textContent='0개';return;}

  const slots={};
  searched.forEach(s=>{teacherFilteredClasses(s).forEach(c=>{const key=c.day+'|'+c.time+'|'+c.room+'|'+c.teacher;if(!slots[key])slots[key]=Object.assign({},c,{students:[]});if(!slots[key].students.find(x=>x.id===s.id))slots[key].students.push(s);});});
  const groups=Object.values(slots).sort((a,b)=>{const da=DAY_ORDER.indexOf(a.day),dbi=DAY_ORDER.indexOf(b.day);if(da!==dbi)return da-dbi;return TIME_TO_NUM(a.time)-TIME_TO_NUM(b.time);});
  document.getElementById('slotCount').textContent=groups.length+'개';

  let html='';
  groups.forEach(g=>{
    const tc=TEACHER_CLASS(g.teacher);
    const tdisp=TEACHER_NAMES[g.teacher]||(g.teacher?g.teacher:'특강');
    html+='<div class="slot-card"><div class="slot-head '+tc+'"><span class="slot-day">'+g.day+'요일</span><span class="slot-time">'+g.time+'</span><span class="slot-room-pill">'+(g.room||'').replace('강의실','강')+'</span><span class="slot-teacher-name">'+tdisp+'</span><span class="slot-stu-count">'+g.students.length+'명</span></div><div class="slot-students">';
    g.students.forEach(s=>{html+='<span class="chip'+(s.hasEnglish?' has-eng':'')+'"><span class="chip-grade">'+gradeShort(s.grade)+'</span>'+s.name+'</span>';});
    html+='</div></div>';
  });
  document.getElementById('homeList').innerHTML=html;
}

function renderTimetable(){
  const filtered=filterByTeacher(allStudents);
  const searched=filterBySearch(filtered);
  document.getElementById('ttSubtitle').textContent=currentTeacher==='admin'?'전체 학생 ('+searched.length+'명)':TEACHER_NAMES[currentTeacher]+' ('+searched.length+'명)';
  if(searched.length===0){document.getElementById('timetableList').innerHTML=emptyState('시간표 없음',searchTerm?'"'+searchTerm+'" 검색 결과가 없어요':'학생 데이터가 없습니다');return;}

  const days=['월','화','수','목','금'];
  // gather all unique time slots
  const timeSet=new Set();
  const grid={};
  days.forEach(d=>grid[d]={});
  searched.forEach(s=>{
    teacherFilteredClasses(s).forEach(c=>{
      if(!grid[c.day])return;
      timeSet.add(c.time);
      const t=c.time;
      if(!grid[c.day][t])grid[c.day][t]={};
      const key=c.room+'|'+c.teacher;
      if(!grid[c.day][t][key])grid[c.day][t][key]={room:c.room,teacher:c.teacher,students:[]};
      if(!grid[c.day][t][key].students.includes(s.name))grid[c.day][t][key].students.push(s.name);
    });
  });
  const allTimes=[...timeSet].sort((a,b)=>TIME_TO_NUM(a)-TIME_TO_NUM(b));
  if(allTimes.length===0){document.getElementById('timetableList').innerHTML=emptyState('시간표 없음','');return;}

  let html='<div class="tt-grid">';
  // Header row
  html+='<div class="tt-row tt-header"><div class="tt-time-label">시간</div>';
  days.forEach(d=>{html+='<div class="tt-day-label">'+d+'<span class="day-date">요일</span></div>';});
  html+='</div>';
  // Body rows
  allTimes.forEach(t=>{
    html+='<div class="tt-row"><div class="tt-time-label">'+t.replace('~',' -<br>')+'</div>';
    days.forEach(d=>{
      const slots=grid[d]?.[t];
      if(!slots||Object.keys(slots).length===0){
        html+='<div class="tt-cell tt-cell-empty"></div>';
      }else{
        html+='<div class="tt-cell">';
        Object.values(slots).forEach(slot=>{
          const tc=TEACHER_CLASS(slot.teacher);
          const tname=TEACHER_NAMES[slot.teacher]||(slot.teacher?slot.teacher:'특강');
          html+='<div class="tt-event '+tc+'" title="'+slot.students.join(', ')+'"><div class="tt-event-head"><span class="tt-event-room">'+(slot.room||'').replace('강의실','강')+'</span><span class="tt-event-teacher">'+tname.replace('쌤','')+'</span><span class="tt-event-count">'+slot.students.length+'</span></div><div class="tt-event-students">'+slot.students.join(', ')+'</div></div>';
        });
        html+='</div>';
      }
    });
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('timetableList').innerHTML=html;
}

function renderClass(){
  const date=currentClassDate;
  const day=dayOfDate(date);
  const filtered=filterByTeacher(allStudents);
  const searched=filterBySearch(filtered);
  const cg=classGuideData[date]||{};
  const todayStuMap={};
  searched.forEach(s=>{const cs=teacherFilteredClasses(s).filter(c=>c.day===day);if(cs.length>0)todayStuMap[s.id]={s,classes:cs};});
  const slots={};
  Object.values(todayStuMap).forEach(({s,classes})=>{classes.forEach(c=>{const key=c.time+'|'+c.room+'|'+c.teacher;if(!slots[key])slots[key]={time:c.time,room:c.room,teacher:c.teacher,students:[]};if(!slots[key].students.find(x=>x.id===s.id))slots[key].students.push(s);});});
  const sortedSlots=Object.values(slots).sort((a,b)=>TIME_TO_NUM(a.time)-TIME_TO_NUM(b.time));
  if(sortedSlots.length===0){document.getElementById('classList').innerHTML=emptyState(day+'요일 수업 없음','오늘은 수업이 없습니다');return;}
  let html='';
  sortedSlots.forEach(slot=>{
    const tc=TEACHER_CLASS(slot.teacher);
    const tname=TEACHER_NAMES[slot.teacher]||(slot.teacher?slot.teacher:'특강');
    html+='<div class="tab-class-time-header '+tc+'"><div class="meta"><span style="font-weight:800">'+slot.time+'</span><span class="slot-room-pill">'+slot.room.replace('강의실','강')+'</span><span style="color:var(--text-muted);font-weight:600">'+tname+'</span></div><span class="slot-stu-count">'+slot.students.length+'명</span></div>';
    slot.students.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(s=>{html+=renderStuCard(s,date,cg[s.id]||{});});
  });
  document.getElementById('classList').innerHTML=html;
  document.querySelectorAll('#classList .stu-card').forEach(card=>{card.querySelector('.stu-card-head').addEventListener('click',e=>{if(e.target.closest('.toggle-btn,.pct-btn,.star-btn,.field-input'))return;card.classList.toggle('open');});});
  document.querySelectorAll('#classList [data-action]').forEach(el=>{el.addEventListener('click',handleStuAction);});
  document.querySelectorAll('#classList [data-input]').forEach(el=>{el.addEventListener('change',handleStuInput);el.addEventListener('blur',handleStuInput);});
}

function renderStuCard(s,date,r){
  const att=r.attendance||'';
  const grade=gradeShort(s.grade);
  const homeworkChk=r.homeworkCheck;
  const hwAssigned=r.homeworkAssigned||'';
  const today=r.todayProgress||'';
  const test=r.test||{};
  const stars=r.stars||{};
  const comment=r.comment||'';
  const initial=(s.name||'').charAt(0);
  return '<div class="stu-card '+att+'" data-sid="'+s.id+'">'
    +'<div class="stu-card-head"><div class="stu-name-row"><div class="stu-avatar'+(s.hasEnglish?' has-eng':'')+'">'+initial+'</div><span class="status-dot '+att+'"></span><span class="stu-name">'+s.name+'</span><span class="stu-meta">'+grade+(s.hasEnglish?' · 영어':'')+'</span></div><span class="expand-arrow">▼</span></div>'
    +'<div class="stu-card-body">'
    +'<div class="field"><div class="field-label">출결</div><div class="toggle-row">'+attBtn(s.id,'present','✅ 출석',att)+attBtn(s.id,'absent','❌ 결석',att)+attBtn(s.id,'late','⏰ 지각',att)+attBtn(s.id,'makeup','🔁 보강',att)+'</div></div>'
    +'<div class="field"><div class="field-label">전 수업 숙제 검사</div><div class="pct-row">'+pctBtn(s.id,0,homeworkChk)+pctBtn(s.id,25,homeworkChk)+pctBtn(s.id,50,homeworkChk)+pctBtn(s.id,75,homeworkChk)+pctBtn(s.id,100,homeworkChk)+'</div></div>'
    +'<div class="field"><div class="field-label">오늘 진도</div><textarea class="field-input" data-input="todayProgress" data-sid="'+s.id+'" placeholder="예: 디딤돌 4-1 p.45-50">'+escapeHtml(today)+'</textarea></div>'
    +'<div class="field"><div class="field-label">데일리 테스트</div><div class="row-2"><input type="text" class="field-input" data-input="testScore" data-sid="'+s.id+'" placeholder="점수 (예: 8/10)" value="'+escapeHtml(test.score||'')+'"><div class="toggle-row">'+testBtn(s.id,'pass','통과',test.result)+testBtn(s.id,'fail','미통과',test.result)+'</div></div></div>'
    +'<div class="field"><div class="field-label">다음 숙제 배정</div><textarea class="field-input" data-input="homeworkAssigned" data-sid="'+s.id+'" placeholder="예: 쎈 4-1 p.38-42">'+escapeHtml(hwAssigned)+'</textarea></div>'
    +'<div class="field"><div class="field-label">별점 (집중도/숙제완성도/성실도/적극도)</div><div class="stars-row">'+starBlock(s.id,'focus','집중도',stars.focus)+starBlock(s.id,'homework','숙제완성도',stars.homework)+starBlock(s.id,'sincerity','성실도',stars.sincerity)+starBlock(s.id,'active','적극도',stars.active)+'</div></div>'
    +'<div class="field"><div class="field-label">코멘트</div><textarea class="field-input" data-input="comment" data-sid="'+s.id+'" placeholder="특이사항이나 다음 수업 시 참고할 것">'+escapeHtml(comment)+'</textarea></div>'
    +'</div></div>';
}
function attBtn(sid,val,label,cur){return '<button class="toggle-btn'+(cur===val?' active '+val:'')+'" data-action="att" data-sid="'+sid+'" data-val="'+val+'">'+label+'</button>';}
function pctBtn(sid,n,cur){return '<button class="pct-btn'+(cur===n?' active':'')+'" data-action="pct" data-sid="'+sid+'" data-val="'+n+'">'+n+'%</button>';}
function testBtn(sid,val,label,cur){return '<button class="toggle-btn'+(cur===val?' active '+val:'')+'" data-action="test" data-sid="'+sid+'" data-val="'+val+'">'+label+'</button>';}
function starBlock(sid,key,label,cur){let h='<div class="stars-item"><div class="stars-label">'+label+'</div><div class="stars-buttons">';for(let i=1;i<=5;i++){h+='<button class="star-btn'+(cur===i?' active':'')+'" data-action="star" data-sid="'+sid+'" data-key="'+key+'" data-val="'+i+'">'+i+'</button>';}h+='</div></div>';return h;}

function handleStuAction(e){
  const btn=e.currentTarget;const sid=btn.dataset.sid;const action=btn.dataset.action;const val=btn.dataset.val;const date=currentClassDate;const path='math_classGuide/'+date+'/'+sid;
  let updates={};let msg='';
  if(action==='att'){updates[path+'/attendance']=val;msg='출결 저장';}
  else if(action==='pct'){updates[path+'/homeworkCheck']=parseInt(val);msg='숙제 검사 저장';}
  else if(action==='test'){updates[path+'/test/result']=val;msg='테스트 저장';if(val==='fail'){const stu=allStudents.find(s=>s.id===sid);const recId='test_'+sid+'_'+date;updates['math_stuMgmt/'+recId]={type:'재시',studentId:sid,studentName:stu?stu.name:sid,date,memo:'데일리 테스트 미통과',resolved:false,createdAt:new Date().toISOString()};}}
  else if(action==='star'){updates[path+'/stars/'+btn.dataset.key]=parseInt(val);msg='별점 저장';}
  firebase.database().ref().update(updates).then(()=>showToast(msg,'success')).catch(e=>showToast('저장 실패: '+e.message,'error'));
}
function handleStuInput(e){
  const el=e.currentTarget;const sid=el.dataset.sid;const inputType=el.dataset.input;const val=el.value;const date=currentClassDate;const path='math_classGuide/'+date+'/'+sid;
  let updates={};
  if(inputType==='todayProgress')updates[path+'/todayProgress']=val;
  else if(inputType==='homeworkAssigned')updates[path+'/homeworkAssigned']=val;
  else if(inputType==='comment')updates[path+'/comment']=val;
  else if(inputType==='testScore')updates[path+'/test/score']=val;
  firebase.database().ref().update(updates).then(()=>{el.style.borderColor='var(--success)';setTimeout(()=>{el.style.borderColor='';},800);}).catch(e=>showToast('저장 실패: '+e.message,'error'));
}

function renderManage(){
  const items=Object.entries(stuMgmtData||{}).map(([id,r])=>({id,...r}));
  const teacherFiltered=currentTeacher==='admin'?items:items.filter(it=>{const stu=allStudents.find(s=>s.id===it.studentId);return stu&&(stu.classes||[]).some(c=>c.teacher===currentTeacher);});
  const filtered=filterMgmt(teacherFiltered,activeManageFilter);
  document.getElementById('manageCount').textContent=filtered.length+'건';
  const filters=[['unresolved','미해결',items.filter(i=>!i.resolved).length],['resolved','해결',items.filter(i=>i.resolved).length],['all','전체',items.length],['결석','결석',items.filter(i=>i.type==='결석'&&!i.resolved).length],['보강','보강',items.filter(i=>i.type==='보강'&&!i.resolved).length],['재시','재시',items.filter(i=>i.type==='재시'&&!i.resolved).length]];
  const fbar=document.getElementById('manageFilters');
  fbar.innerHTML=filters.map(([k,l,c])=>'<button class="filter-chip '+(activeManageFilter===k?'active':'')+'" data-mf="'+k+'">'+l+' '+c+'</button>').join('');
  fbar.querySelectorAll('.filter-chip').forEach(b=>{b.addEventListener('click',()=>{activeManageFilter=b.dataset.mf;renderManage();});});
  if(filtered.length===0){document.getElementById('manageList').innerHTML=emptyState('항목 없음','미해결 사항이 없습니다');return;}
  let html='';
  filtered.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(it=>{
    const initial=(it.studentName||'').charAt(0);
    const badge=it.resolved?'<span class="badge resolved">✓ 해결</span>':'<span class="badge unresolved">'+(it.type||'')+'</span>';
    html+='<div class="list-card"><div class="info"><div class="stu-avatar">'+initial+'</div><div><div class="title">'+it.studentName+' '+badge+'</div><div class="meta">'+(it.date||'')+' · '+(it.memo||'')+'</div></div></div><div class="actions">';
    if(!it.resolved)html+='<button class="primary" data-mgmt-resolve="'+it.id+'">완료</button>';
    html+='<button class="danger" data-mgmt-delete="'+it.id+'">삭제</button></div></div>';
  });
  document.getElementById('manageList').innerHTML=html;
  document.querySelectorAll('[data-mgmt-resolve]').forEach(b=>b.addEventListener('click',()=>firebase.database().ref('math_stuMgmt/'+b.dataset.mgmtResolve+'/resolved').set(true).then(()=>showToast('완료 처리','success'))));
  document.querySelectorAll('[data-mgmt-delete]').forEach(b=>b.addEventListener('click',()=>{if(!confirm('정말 삭제할까요?'))return;firebase.database().ref('math_stuMgmt/'+b.dataset.mgmtDelete).remove().then(()=>showToast('삭제','success'));}));
}
function filterMgmt(items,key){if(key==='all')return items;if(key==='unresolved')return items.filter(i=>!i.resolved);if(key==='resolved')return items.filter(i=>i.resolved);return items.filter(i=>i.type===key&&!i.resolved);}

function renderHistory(){
  const date=currentHistoryDate;const day=dayOfDate(date);const cg=classGuideData[date]||{};
  const filtered=filterByTeacher(allStudents);const searched=filterBySearch(filtered);
  const stus={};
  searched.forEach(s=>{const cs=teacherFilteredClasses(s).filter(c=>c.day===day);if(cs.length>0)stus[s.id]=s;});
  Object.keys(cg).forEach(sid=>{if(stus[sid])return;const s=allStudents.find(x=>x.id===sid);if(s&&(currentTeacher==='admin'||(s.classes||[]).some(c=>c.teacher===currentTeacher)))stus[sid]=s;});
  const list=Object.values(stus);
  if(list.length===0){document.getElementById('historyList').innerHTML=emptyState(date+' 기록 없음','이 날짜에는 수업/기록이 없습니다');return;}
  let html='<div class="section-title">'+date+' '+day+'요일 <span class="count-badge">'+list.length+'명</span></div>';
  list.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(s=>{
    const r=cg[s.id]||{};const att=r.attendance;const cls=att||'';const attLbl={present:'✅ 출석',absent:'❌ 결석',late:'⏰ 지각',makeup:'🔁 보강'}[att]||'미기록';
    const test=r.test||{};const detailParts=[];
    if(r.todayProgress)detailParts.push('📚 진도: '+r.todayProgress);
    if(r.homeworkAssigned)detailParts.push('📝 숙제: '+r.homeworkAssigned);
    if(typeof r.homeworkCheck==='number')detailParts.push('✓ 숙제검사 '+r.homeworkCheck+'%');
    if(test.result)detailParts.push((test.result==='pass'?'✅':'❌')+' 테스트 '+(test.result==='pass'?'통과':'미통과')+(test.score?' '+test.score:''));
    if(r.comment)detailParts.push('💬 '+r.comment);
    const initial=(s.name||'').charAt(0);
    html+='<div class="stu-card '+cls+'"><div class="stu-card-head"><div class="stu-name-row"><div class="stu-avatar">'+initial+'</div><span class="status-dot '+(att||'')+'"></span><span class="stu-name">'+s.name+'</span><span class="stu-meta">'+gradeShort(s.grade)+' · '+attLbl+'</span></div></div>';
    if(detailParts.length>0)html+='<div style="padding:0 16px 13px;font-size:12px;color:var(--text-muted);line-height:1.7">'+detailParts.map(escapeHtml).join('<br>')+'</div>';
    html+='</div>';
  });
  document.getElementById('historyList').innerHTML=html;
}

function renderProgress(){
  const filtered=filterByTeacher(allStudents);const searched=filterBySearch(filtered);
  const filters=['all','초2','초3','초4','초5','초6','중1','중2','중3','?'];
  const fbar=document.getElementById('progressFilters');
  fbar.innerHTML=filters.map(f=>{const cnt=f==='all'?searched.length:searched.filter(s=>normGrade(s)===f).length;if(cnt===0&&f!=='all')return'';const label=f==='all'?('전체 '+cnt):((f==='?'?'미설정':f)+' '+cnt);return '<button class="filter-chip '+(activeProgressFilter===f?'active':'')+'" data-pf="'+f+'">'+label+'</button>';}).join('');
  fbar.querySelectorAll('.filter-chip').forEach(b=>b.addEventListener('click',()=>{activeProgressFilter=b.dataset.pf;renderProgress();}));
  let visible=searched;if(activeProgressFilter!=='all')visible=visible.filter(s=>normGrade(s)===activeProgressFilter);
  if(visible.length===0){document.getElementById('progressList').innerHTML=emptyState('진도 데이터 없음','학생을 추가하거나 필터를 바꿔주세요');return;}
  visible.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  let html='';
  visible.forEach(s=>{
    const books=s.books||{};const stuProg=progressData[s.id]||{};const bookKeys=Object.keys(books);
    const initial=(s.name||'').charAt(0);
    html+='<div class="progress-row"><div class="progress-head"><div style="display:flex;align-items:center;gap:9px"><div class="stu-avatar">'+initial+'</div><div><span class="name">'+s.name+'</span><span class="grade">'+gradeShort(s.grade)+'</span></div></div><button class="btn" style="padding:5px 10px;font-size:11px" onclick="openBookEditModal(\''+s.id+'\')">교재 편집</button></div>';
    if(bookKeys.length===0){html+='<div class="progress-empty">교재 미설정 <button class="add-btn" onclick="openBookEditModal(\''+s.id+'\')">+ 등록</button></div>';}
    else{bookKeys.forEach(book=>{const p=stuProg[book]||{};const cur=p.current||0,tot=p.total||0;const pct=tot>0?Math.round(cur/tot*100):0;html+='<div class="progress-item"><div class="progress-item-head"><span class="progress-book"><b>'+escapeHtml(book)+'</b>'+escapeHtml(books[book])+'</span><span class="progress-pct">'+cur+'/'+tot+' · '+pct+'%</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';});}
    html+='</div>';
  });
  document.getElementById('progressList').innerHTML=html;
}

function renderSettings(){
  const filtered=filterByTeacher(allStudents);const searched=filterBySearch(filtered);
  document.getElementById('settingsStuCount').textContent=searched.length+'명';
  const filters=['all','초2','초3','초4','초5','초6','중1','중2','중3','?'];
  const fbar=document.getElementById('settingsFilters');
  fbar.innerHTML=filters.map(f=>{const cnt=f==='all'?searched.length:searched.filter(s=>normGrade(s)===f).length;if(cnt===0&&f!=='all')return'';const label=f==='all'?('전체 '+cnt):((f==='?'?'미설정':f)+' '+cnt);return '<button class="filter-chip '+(activeSettingsFilter===f?'active':'')+'" data-sf="'+f+'">'+label+'</button>';}).join('');
  fbar.querySelectorAll('.filter-chip').forEach(b=>b.addEventListener('click',()=>{activeSettingsFilter=b.dataset.sf;renderSettings();}));
  let visible=searched;if(activeSettingsFilter!=='all')visible=visible.filter(s=>normGrade(s)===activeSettingsFilter);
  if(visible.length===0){document.getElementById('settingsList').innerHTML=emptyState('학생 없음','추가하거나 필터를 바꿔보세요');return;}
  visible.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  let html='';
  visible.forEach(s=>{
    const teacherSet=[...new Set((s.classes||[]).map(c=>c.teacher).filter(Boolean))];
    const teachers=teacherSet.map(t=>TEACHER_NAMES[t]||t).join(', ')||'-';
    const books=Object.keys(s.books||{}).length;
    const initial=(s.name||'').charAt(0);
    html+='<div class="list-card"><div class="info"><div class="stu-avatar">'+initial+'</div><div><div class="title">'+s.name+(s.hasEnglish?' <span class="badge eng">영어</span>':'')+'</div><div class="meta">'+gradeShort(s.grade)+' · '+teachers+' · 교재 '+books+'권</div></div></div><div class="actions"><button onclick="openEditStudentModal(\''+s.id+'\')">편집</button><button class="danger" onclick="deleteStudent(\''+s.id+'\',\''+s.name+'\')">삭제</button></div></div>';
  });
  document.getElementById('settingsList').innerHTML=html;
}

// Modal
function openModal(title,bodyHtml,footerHtml){
  document.getElementById('modalContent').innerHTML='<div class="modal-head"><div class="modal-title">'+title+'</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body">'+bodyHtml+'</div>'+(footerHtml?'<div class="modal-foot">'+footerHtml+'</div>':'');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target.id==='modalOverlay')closeModal();});

function openAddStudentModal(){
  const body='<div class="field"><div class="field-label">학생 이름 *</div><input class="field-input" id="ns_name" placeholder="홍길동"></div><div class="field"><div class="field-label">학생 ID (영문) *</div><input class="field-input" id="ns_id" placeholder="honggildong"></div><div class="field"><div class="field-label">학년</div><input class="field-input" id="ns_grade" placeholder="초4 / 중1"></div><div class="field"><div class="field-label">결제자</div><input class="field-input" id="ns_payer" placeholder="홍길동(아빠)"></div><div class="field"><div class="field-label">형제그룹</div><input class="field-input" id="ns_sibling" placeholder="홍길동·홍길순"></div><div class="field"><label style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600"><input type="checkbox" id="ns_eng">영어 병행</label></div>';
  openModal('학생 추가',body,'<button class="btn" onclick="closeModal()">취소</button><button class="btn primary" onclick="saveNewStudent()">추가</button>');
}
function saveNewStudent(){
  const name=document.getElementById('ns_name').value.trim();const id=document.getElementById('ns_id').value.trim();
  if(!name||!id){showToast('이름과 ID 필수','error');return;}
  if(allStudents.find(s=>s.id===id)){showToast('ID 중복','error');return;}
  const grade=document.getElementById('ns_grade').value.trim()||'?';
  const kind=grade.startsWith('초')?'초등':(grade.startsWith('중')||grade.startsWith('고'))?'중등':'?';
  const data={name,grade,kind,payer:document.getElementById('ns_payer').value.trim(),siblingGroup:document.getElementById('ns_sibling').value.trim(),hasEnglish:document.getElementById('ns_eng').checked,classes:[],books:{}};
  firebase.database().ref('math_students/'+id).set(data).then(()=>{closeModal();showToast('학생 추가 완료','success');});
}

function openEditStudentModal(sid){
  const s=allStudents.find(x=>x.id===sid);if(!s)return;
  const classesHtml=(s.classes||[]).map((c,i)=>'<div style="display:flex;gap:5px;margin-top:5px;align-items:center"><span style="font-size:11px;flex:1;font-weight:600">'+c.day+'요일 '+c.time+' '+c.room+' '+(TEACHER_NAMES[c.teacher]||c.teacher||'특강')+'</span><button class="btn danger" style="padding:3px 8px;font-size:10px" onclick="removeClass(\''+sid+'\','+i+')">×</button></div>').join('');
  const booksHtml=Object.entries(s.books||{}).map(([k,v])=>'<div style="display:flex;gap:5px;margin-top:5px"><input class="field-input" style="flex:1" value="'+escapeHtml(k)+'" data-bk-key><input class="field-input" style="flex:2" value="'+escapeHtml(v)+'" data-bk-val></div>').join('');
  const body='<div class="field"><div class="field-label">이름</div><input class="field-input" id="es_name" value="'+escapeHtml(s.name||'')+'"></div><div class="field"><div class="field-label">학년</div><input class="field-input" id="es_grade" value="'+escapeHtml(s.grade||'')+'"></div><div class="field"><div class="field-label">결제자</div><input class="field-input" id="es_payer" value="'+escapeHtml(s.payer||'')+'"></div><div class="field"><div class="field-label">형제그룹</div><input class="field-input" id="es_sibling" value="'+escapeHtml(s.siblingGroup||'')+'"></div><div class="field"><label style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600"><input type="checkbox" id="es_eng" '+(s.hasEnglish?'checked':'')+'>영어 병행</label></div><div class="field"><div class="field-label">수업 시간 <button class="btn" style="padding:3px 8px;font-size:10px;float:right" onclick="addClassRow(\''+sid+'\')">+ 추가</button></div><div id="es_classes">'+(classesHtml||'<div style="color:var(--text-subtle);font-size:11px">없음</div>')+'</div></div><div class="field"><div class="field-label">교재 <button class="btn" style="padding:3px 8px;font-size:10px;float:right" onclick="addBookRow()">+ 추가</button></div><div id="es_books">'+booksHtml+'</div></div>';
  openModal('학생 편집: '+s.name,body,'<button class="btn" onclick="closeModal()">취소</button><button class="btn primary" onclick="saveStudent(\''+sid+'\')">저장</button>');
}
function addBookRow(){const div=document.createElement('div');div.style.cssText='display:flex;gap:5px;margin-top:5px';div.innerHTML='<input class="field-input" style="flex:1" placeholder="진도책" data-bk-key><input class="field-input" style="flex:2" placeholder="디딤돌 4-1" data-bk-val>';document.getElementById('es_books').appendChild(div);}
function addClassRow(sid){const day=prompt('요일 (월/화/수/목/금)');if(!day||!'월화수목금'.includes(day))return;const time=prompt('시간 (예: 3:00~4:00)');if(!time)return;const room=prompt('강의실 (1강의실~5강의실)','3강의실');if(!room)return;const teacherChoice=prompt('강사 (imyoung/huijung/hwijae/wonjang/빈칸=특강)','imyoung');const s=allStudents.find(x=>x.id===sid);if(!s)return;const newClasses=[...(s.classes||[]),{day,time,room,teacher:teacherChoice||''}];firebase.database().ref('math_students/'+sid+'/classes').set(newClasses).then(()=>{showToast('수업 추가','success');setTimeout(()=>openEditStudentModal(sid),200);});}
function removeClass(sid,idx){if(!confirm('이 수업을 제거할까요?'))return;const s=allStudents.find(x=>x.id===sid);if(!s)return;const newClasses=(s.classes||[]).filter((_,i)=>i!==idx);firebase.database().ref('math_students/'+sid+'/classes').set(newClasses).then(()=>{showToast('수업 제거','success');setTimeout(()=>openEditStudentModal(sid),200);});}
function saveStudent(sid){const grade=document.getElementById('es_grade').value.trim()||'?';const kind=grade.startsWith('초')?'초등':(grade.startsWith('중')||grade.startsWith('고'))?'중등':'?';const updates={};updates['math_students/'+sid+'/name']=document.getElementById('es_name').value.trim();updates['math_students/'+sid+'/grade']=grade;updates['math_students/'+sid+'/kind']=kind;updates['math_students/'+sid+'/payer']=document.getElementById('es_payer').value.trim();updates['math_students/'+sid+'/siblingGroup']=document.getElementById('es_sibling').value.trim();updates['math_students/'+sid+'/hasEnglish']=document.getElementById('es_eng').checked;const bkKeys=document.querySelectorAll('#es_books [data-bk-key]');const bkVals=document.querySelectorAll('#es_books [data-bk-val]');const books={};for(let i=0;i<bkKeys.length;i++){const k=bkKeys[i].value.trim();const v=bkVals[i].value.trim();if(k)books[k]=v;}updates['math_students/'+sid+'/books']=books;firebase.database().ref().update(updates).then(()=>{closeModal();showToast('저장 완료','success');});}
function deleteStudent(sid,name){if(!confirm(name+' 학생을 정말 삭제할까요? 진도/수업 기록은 남습니다.'))return;firebase.database().ref('math_students/'+sid).remove().then(()=>showToast('삭제','success'));}

function openBookEditModal(sid){
  if(!sid){const opts=allStudents.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(s=>'<option value="'+s.id+'">'+s.name+' ('+gradeShort(s.grade)+')</option>').join('');openModal('교재 일괄 등록','<div class="field"><div class="field-label">학생 선택</div><select class="field-input" id="bk_sid">'+opts+'</select></div>','<button class="btn" onclick="closeModal()">닫기</button><button class="btn primary" onclick="loadBookEditForm()">학생 편집</button>');return;}
  const s=allStudents.find(x=>x.id===sid);if(!s)return;
  const booksHtml=Object.entries(s.books||{}).map(([k,v])=>{const tot=progressData[sid]?.[k]?.total||'';return '<div style="display:flex;gap:5px;margin-top:5px"><input class="field-input" style="flex:1" value="'+escapeHtml(k)+'" data-bk-key placeholder="진도책"><input class="field-input" style="flex:2" value="'+escapeHtml(v)+'" data-bk-val placeholder="디딤돌 4-1"><input class="field-input" style="width:60px" value="'+tot+'" data-bk-tot placeholder="total"></div>';}).join('');
  const body='<div class="field"><div class="field-label">'+s.name+' 교재 <button class="btn" style="padding:3px 8px;font-size:10px;float:right" onclick="addBookRow()">+ 추가</button></div><div id="es_books">'+booksHtml+(Object.keys(s.books||{}).length===0?'<div style="display:flex;gap:5px;margin-top:5px"><input class="field-input" style="flex:1" placeholder="진도책" data-bk-key><input class="field-input" style="flex:2" placeholder="디딤돌 4-1" data-bk-val><input class="field-input" style="width:60px" placeholder="total" data-bk-tot></div>':'')+'</div></div>';
  openModal(s.name+' 교재 편집',body,'<button class="btn" onclick="closeModal()">취소</button><button class="btn primary" onclick="saveBooks(\''+sid+'\')">저장</button>');
}
function loadBookEditForm(){const sid=document.getElementById('bk_sid').value;closeModal();setTimeout(()=>openBookEditModal(sid),100);}
function saveBooks(sid){const bkKeys=document.querySelectorAll('#es_books [data-bk-key]');const bkVals=document.querySelectorAll('#es_books [data-bk-val]');const bkTots=document.querySelectorAll('#es_books [data-bk-tot]');const books={};const updates={};for(let i=0;i<bkKeys.length;i++){const k=bkKeys[i].value.trim();const v=bkVals[i].value.trim();const tot=parseInt(bkTots[i]?.value)||0;if(k){books[k]=v;if(tot>0){updates['math_progress/'+sid+'/'+k+'/total']=tot;updates['math_progress/'+sid+'/'+k+'/current']=progressData[sid]?.[k]?.current||0;}}}updates['math_students/'+sid+'/books']=books;firebase.database().ref().update(updates).then(()=>{closeModal();showToast('교재 저장','success');});}

function emptyState(title,msg){return '<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">'+title+'</div><div>'+msg+'</div></div>';}
function showToast(msg,kind){const t=document.createElement('div');t.className='toast '+(kind||'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.remove();},1800);}

setDateDisplay();
</script>
